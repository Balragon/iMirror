name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore iMirror.sln

      - name: Build
        run: dotnet build iMirror.sln -c Release --no-restore

      - name: Test
        run: dotnet test iMirror.sln -c Release --no-build --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
