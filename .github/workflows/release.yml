name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and package
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test MacMirrorReceiver.Tests/MacMirrorReceiver.Tests.csproj -c Release

      - name: Download Gyan FFmpeg Essentials
        shell: pwsh
        run: |
          # Pinned to a specific Gyan.FFmpeg.Essentials release for reproducible packages.
          # Source: https://github.com/GyanD/codexffmpeg/releases (permanent versioned assets).
          # To upgrade: bump the URL version and replace $expectedSha256 with the new zip hash.
          $ffmpegUrl = "https://github.com/GyanD/codexffmpeg/releases/download/8.1.1/ffmpeg-8.1.1-essentials_build.zip"
          $expectedSha256 = "6F58CE889F59C311410F7D2B18895B33C03456463486F3B1EBC93D97A0F54541"

          $zipPath = "$env:RUNNER_TEMP\ffmpeg-essentials.zip"
          $extractPath = "$env:RUNNER_TEMP\ffmpeg-essentials"

          Write-Host "Downloading FFmpeg Essentials..."
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath

          $actual = (Get-FileHash $zipPath -Algorithm SHA256).Hash
          if ($actual -ne $expectedSha256.ToUpperInvariant()) {
            throw "FFmpeg checksum mismatch. Expected: $expectedSha256  Got: $actual"
          }
          Write-Host "FFmpeg checksum verified."

          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractPath -Force
          $ffmpegExe = Get-ChildItem -LiteralPath $extractPath -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          if (-not $ffmpegExe) {
            throw "ffmpeg.exe not found in extracted archive."
          }

          $versionText = (& $ffmpegExe.FullName -version 2>&1) -join "`n"
          if ($versionText -notmatch "essentials_build") {
            throw "Downloaded FFmpeg is not an essentials_build."
          }

          $destDir = "tools\ffmpeg\bin"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          Copy-Item -LiteralPath $ffmpegExe.FullName -Destination "$destDir\ffmpeg.exe" -Force
          Write-Host "FFmpeg placed at $destDir\ffmpeg.exe"

      - name: Publish Windows x64 package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")

          .\scripts\publish-win-x64.ps1 -Version $version

      - name: Verify package zip
        shell: pwsh
        run: |
          $zips = @(Get-ChildItem -LiteralPath artifacts -Filter "*.zip" -File)
          if ($zips.Count -ne 1) {
            throw "Expected exactly one zip in artifacts, found $($zips.Count)."
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [IO.Compression.ZipFile]::OpenRead($zips[0].FullName)
          try {
            $bundledFfmpeg = $zip.Entries | Where-Object {
              $_.FullName -replace "\\", "/" -match "(^|/)tools/ffmpeg/bin/ffmpeg\.exe$"
            }
            if (-not $bundledFfmpeg) {
              throw "Release package must include tools/ffmpeg/bin/ffmpeg.exe."
            }
          }
          finally {
            $zip.Dispose()
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: iMirror-windows-x64
          path: artifacts/*.zip
          if-no-files-found: error

      - name: Prepare release body
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $bodyPath = "release-body.md"
          $body = ""

          $objectType = (& git cat-file -t "refs/tags/$tag" 2>$null) -join "`n"
          if ($objectType.Trim() -eq "tag") {
            $subject = (& git for-each-ref "refs/tags/$tag" "--format=%(contents:subject)") -join "`n"
            $annotationBody = (& git for-each-ref "refs/tags/$tag" "--format=%(contents:body)") -join "`n"
            $body = (@($subject.Trim(), "", $annotationBody.Trim()) -join "`n").Trim()
          }

          if ([string]::IsNullOrWhiteSpace($body)) {
            $body = @"
          ## iMirror $tag

          Windows x64 package for iMirror $version.

          ### Installation

          1. Download the `iMirror-$version-win-x64.zip` asset.
          2. Extract the zip.
          3. Run `iMirror.exe`.

          ### Notes

          - This package is unsigned; Windows SmartScreen may show a warning.
          - FFmpeg Essentials is bundled under `tools\ffmpeg\bin`.
          - The app is self-contained for .NET 8.
          "@
          }

          Set-Content -LiteralPath $bodyPath -Value $body -Encoding UTF8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          files: artifacts/*.zip
          prerelease: ${{ contains(github.ref_name, '-') }}
