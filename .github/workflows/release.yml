name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and package
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test MacMirrorReceiver.Tests/MacMirrorReceiver.Tests.csproj -c Release

      - name: Publish Windows x64 package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")

          $pathWithoutFfmpeg = foreach ($entry in ($env:PATH -split ";")) {
            if ([string]::IsNullOrWhiteSpace($entry)) {
              continue
            }

            try {
              if (-not (Test-Path -LiteralPath (Join-Path $entry "ffmpeg.exe") -PathType Leaf)) {
                $entry
              }
            }
            catch {
              $entry
            }
          }
          $env:PATH = ($pathWithoutFfmpeg -join ";")

          .\scripts\publish-win-x64.ps1 -Version $version -AllowMissingFfmpeg

      - name: Verify package zip
        shell: pwsh
        run: |
          $zips = @(Get-ChildItem -LiteralPath artifacts -Filter "*.zip" -File)
          if ($zips.Count -ne 1) {
            throw "Expected exactly one zip in artifacts, found $($zips.Count)."
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [IO.Compression.ZipFile]::OpenRead($zips[0].FullName)
          try {
            $bundledFfmpeg = $zip.Entries | Where-Object {
              $_.FullName -replace "\\", "/" -match "(^|/)tools/ffmpeg/bin/ffmpeg\.exe$"
            }
            if ($bundledFfmpeg) {
              throw "FFmpeg must not be bundled in release packages."
            }
          }
          finally {
            $zip.Dispose()
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: iMirror-windows-x64
          path: artifacts/*.zip
          if-no-files-found: error

      - name: Prepare release body
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $bodyPath = "release-body.md"
          $body = ""

          $objectType = (& git cat-file -t "refs/tags/$tag" 2>$null) -join "`n"
          if ($objectType.Trim() -eq "tag") {
            $subject = (& git for-each-ref "refs/tags/$tag" "--format=%(contents:subject)") -join "`n"
            $annotationBody = (& git for-each-ref "refs/tags/$tag" "--format=%(contents:body)") -join "`n"
            $body = (@($subject.Trim(), "", $annotationBody.Trim()) -join "`n").Trim()
          }

          if ([string]::IsNullOrWhiteSpace($body)) {
            $body = @"
          ## iMirror $tag

          Windows x64 package for iMirror $version.

          ### Installation

          1. Download the `iMirror-$version-win-x64.zip` asset.
          2. Extract the zip.
          3. Install FFmpeg: `winget install Gyan.FFmpeg.Essentials`
          4. Run `iMirror.exe`.

          ### Notes

          - This package is unsigned; Windows SmartScreen may show a warning.
          - FFmpeg is not bundled.
          - The app is self-contained for .NET 8.
          "@
          }

          Set-Content -LiteralPath $bodyPath -Value $body -Encoding UTF8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-body.md
          files: artifacts/*.zip
          prerelease: ${{ contains(github.ref_name, '-') }}
